name: docs-governance

on:
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'README_CN.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/docs-governance.yml'
      - 'scripts/validate-docs.ps1'
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'README.md'
      - 'README_CN.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/workflows/docs-governance.yml'
      - 'scripts/validate-docs.ps1'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docs
        shell: pwsh
        run: ./scripts/validate-docs.ps1
